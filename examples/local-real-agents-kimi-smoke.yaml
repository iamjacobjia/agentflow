name: local-real-agents-kimi-smoke
description: Minimal real-agent smoke test for local Codex plus Claude-on-Kimi.
working_dir: .
concurrency: 1
nodes:
  - id: codex_plan
    agent: codex
    target:
      kind: local
      shell: bash
      shell_login: true
      shell_interactive: true
      shell_init:
        - command -v kimi >/dev/null 2>&1
        - kimi
    prompt: |
      Reply with exactly: codex ok
    timeout_seconds: 180
    success_criteria:
      - kind: output_contains
        value: codex ok

  - id: claude_review
    agent: claude
    provider: kimi
    depends_on: [codex_plan]
    target:
      kind: local
      shell: bash
      shell_login: true
      shell_interactive: true
      shell_init:
        - command -v kimi >/dev/null 2>&1
        - kimi
    prompt: |
      Reply with exactly: claude ok
    timeout_seconds: 180
    success_criteria:
      - kind: output_contains
        value: claude ok
